# Supabase project configuration.
# Replace project_id after `supabase link`.

project_id = "eduband"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Require email confirmation; sessions expire; refresh rotation on.
enable_signup = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["eduband://auth-callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[storage]
enabled = true
# Audio files are small; cap to keep abuse down.
file_size_limit = "25MiB"

[edge_runtime]
enabled = true
